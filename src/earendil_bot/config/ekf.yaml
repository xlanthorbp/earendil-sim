# EKF Local — Odom-level sensor fusion 
# Fuses: Wheel odometry + IMU  →  smooth continuous local odometry
# world_frame: odom  (no global corrections, no GPS jumps here)
# publish_tf: true  

ekf_filter_node_odom:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true

    # ── Frames ────────────────────────────────────────────────────────
    map_frame:       map
    odom_frame:      odom
    base_link_frame: base_footprint
    world_frame:     odom       # Local — relative to odom origin

    # ── Wheel odometry: trust velocities only (no absolute position) ──
    odom0: /odom
    odom0_config: [false, false, false,   # x,   y,   z
                   false, false, false,   # roll,pitch,yaw
                   true,  true,  false,   # vx,  vy,  vz
                   false, false, true,    # vroll,vpitch,vyaw
                   false, false, false]   # ax,  ay,  az
    odom0_differential: false
    odom0_relative:    false
    odom0_queue_size:  10

    # ── IMU: orientation + angular velocity + linear acceleration ──────
    imu0: /imu/data
    imu0_config: [false, false, false,    # x,   y,   z
                  true,  true,  true,     # roll,pitch,yaw
                  false, false, false,    # vx,  vy,  vz
                  true,  true,  true,     # vroll,vpitch,vyaw
                  true,  true,  false]    # ax,  ay,  az  (no z-accel)
    imu0_differential: false
    imu0_relative:    false
    imu0_remove_gravitational_acceleration: true
    imu0_queue_size:  10


# EKF Global — Map-level sensor fusion 
# Fuses: Local EKF Odometry + GPS Odometry → Global positioning
# world_frame: map
# publish_tf: true (Provides map -> odom transform)

ekf_filter_node_map:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true

    # ── Frames ────────────────────────────────────────────────────────
    map_frame:       map
    odom_frame:      odom
    base_link_frame: base_footprint
    world_frame:     map

    # ── Local Odometry (from ekf_filter_node_odom) ────────────────────
    odom0: /odometry/local
    odom0_config: [true,  true,  false,   # x,   y,   z
                   false, false, true,    # roll,pitch,yaw
                   true,  true,  false,   # vx,  vy,  vz
                   false, false, true,    # vroll,vpitch,vyaw
                   false, false, false]   # ax,  ay,  az
    odom0_differential: false
    odom0_relative:    false
    odom0_queue_size:  10

    # ── GPS Odometry (from navsat_transform_node) ─────────────────────
    odom1: /odometry/gps
    odom1_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_relative:    false
    odom1_queue_size:  10

    # ── IMU (Optional, but adds stability to Global heading) ──────────
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  false]
    imu0_differential: false
    imu0_relative:    false
    imu0_remove_gravitational_acceleration: true
    imu0_queue_size:  10
