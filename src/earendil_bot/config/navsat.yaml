# NavSat Transform Node parameters
# Converts GPS (NavSatFix) to local odometry (/odometry/gps)
# Used by UKF Global for absolute positioning
#
# DATUM: Fixed reference point matching Gazebo <spherical_coordinates>
#   Gazebo world origin (0,0,0) = GPS (0.0, 0.0, heading=0.0)
#   This keeps map (0,0) locked to the Gazebo world origin instead of
#   letting navsat_transform choose its origin from the first GPS sample.

navsat_transform_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    delay: 0.0
    magnetic_declination_radians: 0.0   # Simulation — no magnetic deviation
    yaw_offset: 3.141592653589793        # 180° correction for observed coordinate flip
    zero_altitude: true
    broadcast_cartesian_transform: false # UKF Global provides map→odom
    publish_filtered_gps: true
    use_odometry_yaw: false             # Use IMU yaw directly
    base_link_frame: base_footprint     # Prevents tf lookup failures
    wait_for_datum: true                # Force a deterministic world origin
    datum: [39.925050, 32.836956, 0.0]
